<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bluegray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0c4de"/>
      <stop offset="100%" stop-color="#4f6d7a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7cac9"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <style type="text/css">
      .main { font: bold 20px sans-serif; fill: #2c3e50; }
      .sub { font: 16px sans-serif; fill: #2c3e50; }
      .label { font: 14px sans-serif; fill: #2c3e50; }
      .arrow { stroke: #4f6d7a; stroke-width: 3; marker-end: url(#arrowhead); }
      .gnn { fill: url(#orange); stroke: #b36a00; stroke-width: 2; }
      .block { fill: url(#bluegray); stroke: #4f6d7a; stroke-width: 2; }
      .residual { stroke: #b36a00; stroke-dasharray: 6,4; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f6d7a"/>
    </marker>
  </defs>

  <!-- Input EEG -->
  <rect x="40" y="210" width="100" height="60" class="block"/>
  <text x="90" y="245" text-anchor="middle" class="main">EEG</text>
  <text x="90" y="265" text-anchor="middle" class="label">(60 channels)</text>

  <!-- Arrow to MLLA -->
  <line x1="140" y1="240" x2="220" y2="240" class="arrow"/>

  <!-- MLLA Encoder -->
  <rect x="220" y="170" width="140" height="140" rx="18" class="block"/>
  <text x="290" y="210" text-anchor="middle" class="main">MLLA</text>
  <text x="290" y="235" text-anchor="middle" class="sub">Encoder</text>
  <text x="290" y="260" text-anchor="middle" class="label">(Temporal Modeling)</text>

  <!-- Arrow to GNN -->
  <line x1="360" y1="240" x2="440" y2="240" class="arrow"/>

  <!-- GNN block (group) -->
  <g>
    <rect x="440" y="90" width="180" height="300" rx="22" class="gnn"/>
    <text x="530" y="120" text-anchor="middle" class="main">Multi-Granularity GNN</text>
    <!-- GNN layers -->
    <rect x="470" y="150" width="120" height="50" rx="10" fill="#b0c4de" stroke="#4f6d7a" stroke-width="1.5"/>
    <text x="530" y="180" text-anchor="middle" class="sub">Global Graph</text>
    <rect x="470" y="220" width="120" height="50" rx="10" fill="#b0c4de" stroke="#4f6d7a" stroke-width="1.5"/>
    <text x="530" y="250" text-anchor="middle" class="sub">Intra-Region Graph</text>
    <rect x="470" y="290" width="120" height="50" rx="10" fill="#b0c4de" stroke="#4f6d7a" stroke-width="1.5"/>
    <text x="530" y="320" text-anchor="middle" class="sub">Inter-Region Graph</text>
    <!-- Fusion -->
    <rect x="495" y="360" width="70" height="30" rx="7" fill="#e3eaf2" stroke="#4f6d7a" stroke-width="1"/>
    <text x="530" y="380" text-anchor="middle" class="label">Fusion</text>
  </g>

  <!-- Residual connection -->
  <path d="M360,240 Q400,400 530,400 Q660,400 660,240" class="residual" fill="none"/>
  <polygon points="655,235 665,240 655,245" fill="#b36a00"/>
  <text x="600" y="420" text-anchor="middle" class="label">Residual Add</text>

  <!-- Arrow to Output -->
  <line x1="620" y1="240" x2="700" y2="240" class="arrow"/>

  <!-- Output block -->
  <rect x="700" y="210" width="120" height="60" class="block"/>
  <text x="760" y="245" text-anchor="middle" class="main">Feature</text>
  <text x="760" y="265" text-anchor="middle" class="label">(for downstream tasks)</text>

  <!-- Legends -->
  <rect x="40" y="400" width="20" height="20" class="block"/>
  <text x="70" y="415" class="label">Basic Module</text>
  <rect x="160" y="400" width="20" height="20" class="gnn"/>
  <text x="190" y="415" class="label">GNN Module</text>
  <line x1="270" y1="410" x2="310" y2="410" class="residual"/>
  <text x="320" y="415" class="label">Residual</text>
</svg>
