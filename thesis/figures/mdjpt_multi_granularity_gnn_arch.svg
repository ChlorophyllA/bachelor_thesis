<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800" height="900" viewBox="0 0 1800 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bluegray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf0f6"/>
      <stop offset="100%" stop-color="#b0c4de"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe5b4"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <style type="text/css">
      .main { font: bold 28px sans-serif; fill: #2c3e50; }
      .sub { font: 22px sans-serif; fill: #2c3e50; }
      .label { font: 18px sans-serif; fill: #2c3e50; }
      .arrow { stroke: #4f6d7a; stroke-width: 4; marker-end: url(#arrowhead); }
      .gnn { fill: url(#orange); stroke: #b36a00; stroke-width: 3; }
      .block { fill: url(#bluegray); stroke: #4f6d7a; stroke-width: 3; }
      .residual { stroke: #b36a00; stroke-dasharray: 8,6; stroke-width: 3; }
      .section { font: bold 24px sans-serif; fill: #3b5998; }
      .param { font: italic 16px sans-serif; fill: #4f6d7a; }
    </style>
    <marker id="arrowhead" markerWidth="16" markerHeight="12" refX="16" refY="6" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 16 6, 0 12" fill="#4f6d7a"/>
    </marker>
  </defs>

  <!-- (a) 输入：多数据集 EEG 信号 -->
  <rect x="40" y="60" width="260" height="260" rx="18" class="block"/>
  <text x="170" y="85" text-anchor="middle" class="section">(a) Input: Multi-dataset EEG</text>
  <text x="170" y="110" text-anchor="middle" class="label">SEED-VII, SEED-IV, SEED-V</text>
  <text x="170" y="130" text-anchor="middle" class="label">0.5-47Hz, ICA, 5s window</text>
  <text x="170" y="150" text-anchor="middle" class="label">60 ch × 625 timepoints</text>

  <!-- Arrow to (b) -->
  <line x1="300" y1="150" x2="370" y2="150" class="arrow"/>

  <!-- (b) 通道投影 -->
  <rect x="370" y="60" width="260" height="260" rx="18" class="block"/>
  <text x="500" y="85" text-anchor="middle" class="section">(b) Channel Projection</text>
  <text x="500" y="110" text-anchor="middle" class="label">Map to 60 standard 10-20</text>
  <text x="500" y="130" text-anchor="middle" class="label">Nearest-neighbor fill, drop extra</text>
  <text x="500" y="150" text-anchor="middle" class="label">Shape: [B,1,60,625]</text>

  <!-- Arrow to (c) -->
  <line x1="630" y1="150" x2="700" y2="150" class="arrow"/>

  <!-- (c) 编码器：MLLA + 多粒度 GNN -->
  <rect x="700" y="30" width="480" height="340" rx="22" class="block"/>
  <text x="940" y="55" text-anchor="middle" class="section">(c) Encoder: MLLA + Multi-Granularity GNN</text>

  <!-- MLLA block -->
  <rect x="730" y="90" width="180" height="220" rx="16" class="block" style="stroke-dasharray: 6,4;"/>
  <text x="820" y="110" text-anchor="middle" class="main">MLLA Encoder</text>
  <text x="820" y="130" text-anchor="middle" class="label">Patch Embedding (P=32,S=6)</text>
  <text x="820" y="145" text-anchor="middle" class="label">2×MLLAEncoderLayer</text>
  <text x="820" y="160" text-anchor="middle" class="label">CPE + Linear Attention + FFN</text>
  <text x="820" y="175" text-anchor="middle" class="label">Shared weights, ~375k params</text>
  <text x="820" y="190" text-anchor="middle" class="label">[B,60,99,32]</text>

  <!-- GNN block -->
  <rect x="940" y="90" width="220" height="220" rx="16" class="gnn"/>
  <text x="1050" y="110" text-anchor="middle" class="main">Multi-Granularity GNN</text>
  <text x="1050" y="130" text-anchor="middle" class="label">7 brain regions:</text>
  <text x="1050" y="145" text-anchor="middle" class="label">PFC, Frontal, FC, C, Temporal,</text>
  <text x="1050" y="160" text-anchor="middle" class="label">Parietal, Occipital</text>
  <text x="1050" y="175" text-anchor="middle" class="label">Global (60×60, learnable A_g)</text>
  <text x="1050" y="190" text-anchor="middle" class="label">Intra-region (7 GCNs)</text>
  <text x="1050" y="205" text-anchor="middle" class="label">Inter-region (7×7, learnable A_r)</text>

  <!-- Fusion and residual -->
  <rect x="1180" y="200" width="60" height="60" rx="8" fill="#e3eaf2" stroke="#4f6d7a" stroke-width="2"/>
  <text x="1210" y="165" text-anchor="middle" class="label">Fusion</text>
  <path d="M910,200 Q1100,270 1250,200" class="residual" fill="none"/>
  <polygon points="1245,195 1255,200 1245,205" fill="#b36a00"/>
  <text x="1150" y="250" text-anchor="middle" class="label">x' = x + α·h_fused</text>

  <!-- Arrow to (投影头) -->
  <line x1="1260" y1="160" x2="1340" y2="160" class="arrow"/>

  <!-- 投影头 -->
  <rect x="1340" y="100" width="180" height="180" rx="16" class="block"/>
  <text x="1430" y="120" text-anchor="middle" class="main">Projector</text>
  <text x="1430" y="140" text-anchor="middle" class="label">uni_mlp: Linear(60→64)</text>
  <text x="1430" y="160" text-anchor="middle" class="label">VQ (512×128), CNN Projector</text>
  <text x="1430" y="180" text-anchor="middle" class="label">L2-normalized CLISA feature</text>

  <!-- Arrow to (d) -->
  <line x1="1520" y1="160" x2="1600" y2="160" class="arrow"/>

  <!-- (d) 预训练损失函数 -->
  <rect x="1600" y="30" width="180" height="260" rx="22" class="block"/>
  <text x="1690" y="50" text-anchor="middle" class="section">(d) Pretraining Loss</text>
  <text x="1690" y="80" text-anchor="middle" class="label">CLISA: InfoNCE, τ=0.2</text>
  <text x="1690" y="110" text-anchor="middle" class="label">CDA: Covariance Align, λ=1e-2</text>
  <text x="1690" y="140" text-anchor="middle" class="label">VQ: λ=1.0</text>
  <text x="1690" y="170" text-anchor="middle" class="label">L = L_clisa + λ_cda·L_cda + λ_vq·L_vq</text>

  <!-- Arrow to (e) -->
  <line x1="1690" y1="290" x2="1690" y2="400" class="arrow"/>

  <!-- (e) 下游评估 -->
  <rect x="1600" y="340" width="180" height="260" rx="22" class="block"/>
  <text x="1690" y="360" text-anchor="middle" class="section">(e) Downstream Eval</text>
  <text x="1690" y="385" text-anchor="middle" class="label">Feature extraction (frozen)</text>
  <text x="1690" y="410" text-anchor="middle" class="label">ME, running norm, LDS</text>
  <text x="1690" y="435" text-anchor="middle" class="label">3-layer MLP (128→64→5)</text>
  <text x="1690" y="460" text-anchor="middle" class="label">6-fold LOSO CV</text>

  <!-- 关键超参数 -->
  <rect x="40" y="340" width="1500" height="240" rx="18" fill="#f7fafd" stroke="#b0c4de" stroke-width="2"/>
  <text x="790" y="360" text-anchor="middle" class="section">Key Hyperparameters</text>
  <text x="120" y="385" class="param">lr=1e-3, wd=1e-4, CLISA τ=0.2</text>
  <text x="120" y="405" class="param">MLLA: patch=32, stride=6, hidden=128, out=32, depth=2, n_heads=8</text>
  <text x="120" y="425" class="param">GNN: hidden=64, n_layers=1, dist_sigma=0.3, GAT on global/inter-region</text>
  <text x="120" y="445" class="param">VQ: n_emb=512, emb_dim=128, commitment=0.25</text>
  <text x="120" y="465" class="param">Aug: Gaussian noise σ=0.005 (train only)</text>
  <text x="120" y="485" class="param">Train: max_epochs=2, n_pairs=128-1024, 4 DataLoader workers</text>

</svg>
